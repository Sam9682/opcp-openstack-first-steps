server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Rewrite root to the English landing page
    location = / {
        rewrite ^/$ /en/index.html break;
    }

    # Redirect all non-en and non-fr paths to en/ by default
    location / {
        # If the requested path doesn't start with /en/ or /fr/, redirect to /en/
        if ($request_uri !~ "^/(en|fr)/") {
            rewrite ^/(.*)$ /en/$1 break;
        }
    }

    # Serve static files with caching
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # Handle 404 with the custom page
    error_page 404 /404.html;

    location = /404.html {
        internal;
    }
}